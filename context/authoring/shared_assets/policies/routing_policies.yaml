version: 1
policies:
  - id: policy:smoke_test/default
    intent: smoke_test
    default_budget_profile: small
    required_indexes:
      - asset_registry.index
      - asset_graph
      - by_behavior
      - by_asset
    max_assets_per_type:
      behavior_asset: 2
      bdd_scenario_asset: 3
      validation_fact: 3
      validator_asset: 2
      module_fact: 2
    load_order:
      - behavior_asset
      - bdd_scenario_asset
      - validation_fact
      - validator_asset
      - module_fact
    required_slots:
      - behavior_asset
    optional_slots:
      - bdd_scenario_asset
      - validation_fact
      - validator_asset
      - module_fact
    sufficiency_threshold: 0.7
    allow_stale_required: true
    expansion_rules:
      - from: behavior_asset
        via: has_bdd
        max_depth: 1
      - from: behavior_asset
        via: validated_by
        max_depth: 1
      - from: behavior_asset
        via: executed_by
        max_depth: 1
      - from: behavior_asset
        via: implemented_by
        max_depth: 1
      - from: behavior_asset
        via: depends_on_behavior
        max_depth: 1
