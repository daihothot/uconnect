$schema: https://json-schema.org/draft/2020-12/schema
$id: uconnect://schemas/specification_asset.schema.yaml
title: UConnect Specification Asset Body
type: object
additionalProperties: false
# Specification Asset 沉淀“设计承诺怎么做”，并映射 Requirement、BDD、验证和实现证据。
required:
  - specification_id
  - asset_type
  - source
  - scope
  - requirement_refs
  - feature_refs
  - commitments
properties:
  # 规格资产稳定 ID。
  specification_id:
    type: string
    pattern: "^spec:.+$"
  # 资产类型固定为 specification_asset。
  asset_type:
    const: specification_asset
  # 规格来源信息。
  source:
    type: object
    additionalProperties: false
    required:
      - provider
    properties:
      # 来源提供方。
      provider:
        type: string
        enum:
          - adapter_spec
          - adapter_plan
          - design_doc
          - manual_authoring
          - other
      # 来源引用，例如 spec、plan、issue、PR 或 commit。
      source_refs:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - type
            - ref
          properties:
            type:
              type: string
              enum:
                - spec
                - plan
                - task
                - doc
                - issue
                - project
                - discussion
                - comment
                - pr
                - commit
                - other
            ref:
              type: string
            url:
              type: string
  # 规格适用范围。
  scope:
    type: object
    additionalProperties: false
    properties:
      # 适用 domain。
      domains:
        type: array
        items:
          type: string
      # 适用 module。
      modules:
        type: array
        items:
          type: string
          pattern: "^module:.+$"
      # 适用平台。
      platforms:
        type: array
        items:
          type: string
      # 适用场景标签。
      scenarios:
        type: array
        items:
          type: string
      # 适用能力标签。
      capabilities:
        type: array
        items:
          type: string
  # 覆盖的 Requirement Asset，回答这份规格承诺解决哪些需求。
  requirement_refs:
    type: array
    items:
      type: string
      pattern: "^requirement:.+$"
  # 归属 Feature Asset，Specification 不直接替代 Feature。
  feature_refs:
    type: array
    items:
      type: string
      pattern: "^feature:.+$"
  # 设计承诺列表，回答设计上承诺怎么做。
  commitments:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - commitment_id
        - statement
      properties:
        # 设计承诺稳定 ID。
        commitment_id:
          type: string
        # 设计承诺正文。
        statement:
          type: string
          minLength: 1
        # 设计理由或取舍说明。
        rationale:
          type: string
        # 该承诺覆盖的 Requirement Asset。
        requirement_refs:
          type: array
          items:
            type: string
            pattern: "^requirement:.+$"
        # 该承诺关联的 Architecture Fact。
        architecture_fact_refs:
          type: array
          items:
            type: string
            pattern: "^arch:.+$"
        # 该承诺关联的 Validation Fact。
        validation_fact_refs:
          type: array
          items:
            type: string
            pattern: "^validation:.+$"
        # 该承诺关联的 BDD Scenario Asset。
        bdd_refs:
          type: array
          items:
            type: string
            pattern: "^bdd:.+$"
        # 该承诺关联的实现或验证证据。
        implementation_evidence_refs:
          type: array
          items:
            type: string
  # Requirement 覆盖关系，回答哪些需求已覆盖、部分覆盖、不在范围内或被替代。
  requirement_coverage:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - requirement_ref
        - coverage_status
      properties:
        # 被覆盖的 Requirement Asset。
        requirement_ref:
          type: string
          pattern: "^requirement:.+$"
        # 覆盖状态。
        coverage_status:
          type: string
          enum:
            - covered
            - partially_covered
            - out_of_scope
            - superseded
        # 支撑该覆盖结论的承诺 ID。
        commitment_refs:
          type: array
          items:
            type: string
        # 覆盖说明。
        notes:
          type: string
  # 实现覆盖关系，回答真正做了什么。
  implementation_coverage:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        # 相关设计承诺 ID。
        commitment_refs:
          type: array
          items:
            type: string
        # 相关 PR 引用。
        pr_refs:
          type: array
          items:
            type: string
        # 相关 commit 引用。
        commit_refs:
          type: array
          items:
            type: string
        # 相关实现或验证证据引用。
        evidence_refs:
          type: array
          items:
            type: string
        # 实现覆盖说明。
        notes:
          type: string
  # 验证覆盖关系，回答怎么证明。
  validation_coverage:
    type: array
    items:
      type: object
      additionalProperties: false
      properties:
        # 相关设计承诺 ID。
        commitment_refs:
          type: array
          items:
            type: string
        # 相关 Validation Fact。
        validation_fact_refs:
          type: array
          items:
            type: string
            pattern: "^validation:.+$"
        # 相关 Validator Asset。
        validator_refs:
          type: array
          items:
            type: string
            pattern: "^validator:.+$"
        # 相关 BDD Scenario Asset。
        bdd_refs:
          type: array
          items:
            type: string
            pattern: "^bdd:.+$"
        # 验证证据引用。
        evidence_refs:
          type: array
          items:
            type: string
  # 生命周期或复核状态。
  status:
    type: string
  # 维护说明。
  notes:
    type: string
